<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Reverser - Toolkit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="tool-header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2 class="m-0">Text Reverser</h2>
            <button class="info-btn" data-bs-toggle="modal" data-bs-target="#infoModal"><i class="fa-solid fa-info"></i></button>
        </div>
        
        <div class="tool-panel">
            <div class="input-group"><label>Original Text</label><textarea id="rev-input" class="styled-input" style="height: 120px;" placeholder="Type text to reverse..."></textarea></div>
            <div class="input-group">
                <label>Reverse Mode</label>
                <select id="rev-mode" class="styled-select" style="appearance: auto;">
                    <option value="chars">Reverse Characters (olleh)</option>
                    <option value="words">Reverse Word Order (world hello)</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                <button id="btn-reverse" class="btn custom-btn btn-secondary" style="flex: 2;"><i class="fa-solid fa-right-left"></i> REVERSE IT</button>
                <button id="btn-clear" class="btn custom-btn" style="flex: 1; border-color: var(--danger-color); color: var(--danger-color);"><i class="fa-solid fa-eraser"></i></button>
            </div>
            <div class="input-group"><label>Reversed Result</label><textarea id="rev-output" class="styled-input" style="height: 120px;" readonly placeholder="Result will appear here..."></textarea></div>
            <button id="btn-copy" class="btn custom-btn w-100 m-0"><i class="fa-solid fa-copy"></i> COPY RESULT</button>
        </div>
    </div>

    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa-solid fa-right-left"></i> Text Reverser</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>A fun and practical tool for creating secret messages or debugging Right-To-Left (RTL) language formatting.</p>
                    <ul>
                        <li><i class="fa-solid fa-font"></i> <strong>Characters Mode:</strong> Flips the entire string backwards. ("Apple" ➔ "elppA")</li>
                        <li><i class="fa-solid fa-align-left"></i> <strong>Words Mode:</strong> Flips the sentence structure but keeps the spelling normal.</li>
                    </ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn custom-btn btn-secondary w-100 m-0" data-bs-dismiss="modal">GOT IT</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const playClick = () => new Audio('data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTEAAAAA/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/w==').play().catch(()=>{});
            document.querySelectorAll('button, .back-btn').forEach(el => el.addEventListener('click', playClick));

            const inTxt = document.getElementById('rev-input'), outTxt = document.getElementById('rev-output'), modeSelect = document.getElementById('rev-mode');

            document.getElementById('btn-reverse').addEventListener('click', () => {
                const t = inTxt.value; if (!t) return;
                outTxt.value = modeSelect.value === 'chars' ? t.split('').reverse().join('') : t.split(' ').reverse().join(' ');
            });

            document.getElementById('btn-clear').addEventListener('click', () => { inTxt.value = ''; outTxt.value = ''; });
            const copyBtn = document.getElementById('btn-copy');
            copyBtn.addEventListener('click', () => { if (!outTxt.value) return; navigator.clipboard.writeText(outTxt.value); const og = copyBtn.innerHTML; copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> COPIED!'; setTimeout(() => copyBtn.innerHTML = og, 1500); });
        });
    </script>
</body>
</html>
