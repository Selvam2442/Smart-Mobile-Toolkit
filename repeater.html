<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Repeater - Toolkit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="tool-header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2 class="m-0">Text Repeater</h2>
            <button class="info-btn" data-bs-toggle="modal" data-bs-target="#infoModal"><i class="fa-solid fa-info"></i></button>
        </div>
        
        <div class="tool-panel">
            <div class="input-group"><label>Text to repeat</label><textarea id="rep-input" class="styled-input" style="height: 100px;" placeholder="Type here..."></textarea></div>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div class="input-group" style="flex: 1; min-width: 130px;"><label>Count</label><input type="number" id="rep-count" class="styled-input" value="10" min="1" max="10000"></div>
                <div class="input-group" style="flex: 1; min-width: 130px;"><label>Separator</label><input type="text" id="rep-sep" class="styled-input" placeholder="e.g. , "></div>
            </div>
            <div class="checkbox-group" style="margin-bottom: 25px;">
                <input type="checkbox" id="check-newline"> <label for="check-newline">New Line</label>
                <input type="checkbox" id="check-space" checked> <label for="check-space">Space</label>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="btn-repeat" class="btn custom-btn" style="flex: 2;"><i class="fa-solid fa-repeat"></i> REPEAT</button>
                <button id="btn-clear" class="btn custom-btn btn-secondary" style="flex: 1;"><i class="fa-solid fa-eraser"></i></button>
            </div>
            <hr style="border-color: var(--surface-border); margin: 30px 0;">
            <div class="input-group"><label>Result</label><textarea id="rep-output" class="styled-input" style="height: 120px;" readonly placeholder="Output here..."></textarea></div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button id="btn-copy" class="btn custom-btn" style="flex: 1;"><i class="fa-solid fa-copy"></i> COPY</button>
                <button id="btn-whatsapp" class="btn custom-btn" style="flex: 1; border-color: #25D366; color: #25D366;"><i class="fa-brands fa-whatsapp"></i> WHATSAPP</button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa-solid fa-repeat"></i> Text Repeater</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Generate massive blocks of repeating text instantly. Perfect for testing limits or creating dummy text.</p>
                    <ul>
                        <li><i class="fa-solid fa-keyboard"></i> Set how many times it should repeat.</li>
                        <li><i class="fa-solid fa-grip-lines"></i> Use the Separator options to divide words.</li>
                        <li><i class="fa-brands fa-whatsapp" style="color: #25D366;"></i> Use the WhatsApp button to directly share the result!</li>
                    </ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn custom-btn btn-secondary w-100 m-0" data-bs-dismiss="modal">GOT IT</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const playClick = () => new Audio('data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTEAAAAA/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/w==').play().catch(()=>{});
            document.querySelectorAll('button, .back-btn').forEach(el => el.addEventListener('click', playClick));

            const inTxt = document.getElementById('rep-input'), outTxt = document.getElementById('rep-output');
            document.getElementById('btn-repeat').addEventListener('click', () => {
                const text = inTxt.value, count = parseInt(document.getElementById('rep-count').value) || 1;
                if (!text) return alert("Please enter some text to repeat.");
                let sep = document.getElementById('rep-sep').value;
                if (document.getElementById('check-space').checked && sep === "") sep = " ";
                if (document.getElementById('check-newline').checked) sep += "\n";
                outTxt.value = Array(count).fill(text).join(sep);
            });

            document.getElementById('btn-clear').addEventListener('click', () => { inTxt.value = ''; outTxt.value = ''; document.getElementById('rep-sep').value = ''; });
            const copyBtn = document.getElementById('btn-copy');
            copyBtn.addEventListener('click', () => { if (!outTxt.value) return; navigator.clipboard.writeText(outTxt.value); const og = copyBtn.innerHTML; copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> COPIED'; setTimeout(() => copyBtn.innerHTML = og, 1500); });
            document.getElementById('btn-whatsapp').addEventListener('click', () => { if (!outTxt.value) return; window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(outTxt.value)}`, '_blank'); });
        });
    </script>
</body>
</html>
