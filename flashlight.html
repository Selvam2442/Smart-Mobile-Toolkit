<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashlight - Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="tool-header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>Screen Flashlight</h2>
        </div>
        
        <div class="tool-panel">
            <i class="fa-solid fa-bolt" style="font-size: 5rem; color: #fff; text-shadow: 0 0 30px #fff; margin-bottom: 30px;"></i>
            
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display:block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted);"><i class="fa-solid fa-sun"></i> Brightness Level</label>
                <input type="range" id="flash-bright" min="5" max="100" value="100">
            </div>

            <button id="flash-toggle" class="btn" style="width: 100%; margin-top: 10px;"><i class="fa-solid fa-power-off"></i> TURN ON</button>
        </div>
    </div>
    
    <div id="fullscreen-overlay" style="z-index: 9999;"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const clickSound = new Audio('data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTEAAAAA/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/w==');
            document.querySelectorAll('.btn, .back-btn').forEach(el => el.addEventListener('click', () => clickSound.cloneNode().play().catch(()=>{})));

            const overlay = document.getElementById('fullscreen-overlay');
            const toggleBtn = document.getElementById('flash-toggle');
            const brightSlider = document.getElementById('flash-bright');
            let isOn = false;

            function updateBrightness() {
                // Using HSL keeps it 100% solid. It just changes the Lightness from 100% (White) to lower % (Dark Gray/Black).
                const brightness = brightSlider.value;
                overlay.style.backgroundColor = `hsl(0, 0%, ${brightness}%)`;
            }

            toggleBtn.addEventListener('click', () => {
                isOn = !isOn;
                if (isOn) {
                    overlay.style.display = 'flex';
                    updateBrightness();
                    overlay.innerHTML = '<button id="exit-flash" class="btn btn-secondary" style="background:#000; position:absolute; bottom:40px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 10;"><i class="fa-solid fa-power-off"></i> TURN OFF</button>';
                    document.getElementById('exit-flash').addEventListener('click', () => toggleBtn.click());
                } else {
                    overlay.style.display = 'none';
                }
            });

            brightSlider.addEventListener('input', updateBrightness);
        });
    </script>
</body>
</html>
