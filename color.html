<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker - Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="tool-header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>Color Picker</h2>
        </div>
        
        <div class="tool-panel">
            <div id="color-preview" style="background-color: #00f0ff; box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3);"></div>
            
            <h2 id="hex-display" style="font-size: 2.5rem; letter-spacing: 3px; margin-bottom: 20px; font-weight: 800;">#00F0FF</h2>
            
            <div style="position: relative; overflow: hidden; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--surface-border);">
                <input type="color" id="color-input" value="#00f0ff" style="width: 110%; height: 60px; border: none; background: transparent; cursor: pointer; transform: translate(-5%, -5%);">
            </div>

            <button id="copy-color" class="btn" style="width: 100%;"><i class="fa-solid fa-copy"></i> COPY HEX CODE</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const clickSound = new Audio('data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTEAAAAA/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/w==');
            document.querySelectorAll('.btn, .back-btn').forEach(el => el.addEventListener('click', () => clickSound.cloneNode().play().catch(()=>{})));

            const picker = document.getElementById('color-input');
            const hexDisplay = document.getElementById('hex-display');
            const preview = document.getElementById('color-preview');
            const copyBtn = document.getElementById('copy-color');

            picker.addEventListener('input', (e) => {
                const color = e.target.value;
                hexDisplay.innerText = color.toUpperCase();
                preview.style.backgroundColor = color;
                
                // Dynamic shadow based on chosen color
                // Convert hex to rgb for rgba shadow
                let r = parseInt(color.slice(1, 3), 16),
                    g = parseInt(color.slice(3, 5), 16),
                    b = parseInt(color.slice(5, 7), 16);
                preview.style.boxShadow = `0 10px 30px rgba(${r}, ${g}, ${b}, 0.3)`;
            });

            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(hexDisplay.innerText);
                const originalHtml = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> COPIED!';
                copyBtn.style.backgroundColor = 'var(--primary-glow)';
                copyBtn.style.color = '#000';
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalHtml;
                    copyBtn.style.backgroundColor = '';
                    copyBtn.style.color = '';
                }, 1500);
            });
        });
    </script>
</body>
</html>
