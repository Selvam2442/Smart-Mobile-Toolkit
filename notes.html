<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Notes - Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container" id="main-container">
        <div id="list-view">
            <div class="tool-header">
                <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
                <h2>Notes Library</h2>
            </div>
            
            <div class="tool-panel" style="padding: 30px 20px;">
                <button id="create-new-btn" class="btn" style="width: 100%;"><i class="fa-solid fa-plus"></i> CREATE NEW NOTE</button>
                <div id="notes-grid">
                    </div>
            </div>
        </div>

        <div id="editor-view" style="display: none; flex-direction: column; height: 100%;">
            <div class="tool-panel" id="editor-panel" style="display: flex; flex-direction: column; flex-grow: 1;">
                <div class="notes-header">
                    <button id="back-to-list" class="back-btn" style="width: 45px; height: 45px;"><i class="fa-solid fa-arrow-left"></i></button>
                    <button id="toggle-fullscreen" class="tool-btn" style="flex-grow: 0; width: 45px;"><i class="fa-solid fa-expand"></i></button>
                </div>

                <input type="text" id="note-title-input" placeholder="Note Title..." style="width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--surface-border); color: #fff; font-size: 1.5rem; font-weight: 600; padding: 10px 5px; margin-bottom: 15px; outline: none;">

                <div class="toolbar">
                    <button class="tool-btn" onclick="formatDoc('bold')" title="Bold"><i class="fa-solid fa-bold"></i></button>
                    <button class="tool-btn" onclick="formatDoc('italic')" title="Italic"><i class="fa-solid fa-italic"></i></button>
                    <button class="tool-btn" onclick="formatDoc('formatBlock', 'H1')" title="Heading 1">H1</button>
                    <button class="tool-btn" onclick="formatDoc('formatBlock', 'H2')" title="Heading 2">H2</button>
                    <button class="tool-btn" onclick="formatDoc('insertUnorderedList')" title="Bullet List"><i class="fa-solid fa-list-ul"></i></button>
                    <button class="tool-btn" onclick="insertCheckbox()" title="To-Do Checkbox"><i class="fa-regular fa-square-check"></i></button>
                </div>

                <div id="editor-area" contenteditable="true" placeholder="Start typing your awesome ideas here..."></div>
                
                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button id="save-note" class="btn" style="width: 100%;"><i class="fa-solid fa-floppy-disk"></i> SAVE NOTE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const clickSound = new Audio('data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTEAAAAA/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/w==');
            const playClick = () => clickSound.cloneNode().play().catch(()=>{});
            document.querySelectorAll('button, .back-btn').forEach(el => el.addEventListener('click', playClick));

            const listView = document.getElementById('list-view');
            const editorView = document.getElementById('editor-view');
            const notesGrid = document.getElementById('notes-grid');
            const titleInput = document.getElementById('note-title-input');
            const editorArea = document.getElementById('editor-area');
            const editorPanel = document.getElementById('editor-panel');
            
            let notes = JSON.parse(localStorage.getItem('smart_notes_advanced')) || [];
            let currentEditingId = null;

            function renderNotes() {
                notesGrid.innerHTML = '';
                if(notes.length === 0) {
                    notesGrid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; margin-top: 20px;">No notes yet. Create one!</p>';
                    return;
                }

                notes.sort((a, b) => b.updatedAt - a.updatedAt).forEach(note => {
                    const card = document.createElement('div');
                    card.className = 'note-card';
                    card.onclick = () => openEditor(note.id);
                    
                    const tmp = document.createElement('div');
                    tmp.innerHTML = note.content;
                    const previewText = tmp.textContent || tmp.innerText || "";

                    card.innerHTML = `
                        <h4>${note.title || 'Untitled Note'}</h4>
                        <p>${previewText || 'No content...'}</p>
                        <span class="date">${new Date(note.updatedAt).toLocaleString()}</span>
                        <button class="delete-note" onclick="deleteNote(event, ${note.id})"><i class="fa-solid fa-trash"></i></button>
                    `;
                    notesGrid.appendChild(card);
                });
            }

            function openEditor(id = null) {
                listView.style.display = 'none';
                editorView.style.display = 'flex';
                
                if (id) {
                    const note = notes.find(n => n.id === id);
                    currentEditingId = id;
                    titleInput.value = note.title;
                    editorArea.innerHTML = note.content;
                } else {
                    currentEditingId = Date.now();
                    titleInput.value = '';
                    editorArea.innerHTML = '';
                }
            }

            document.getElementById('save-note').addEventListener('click', () => {
                const title = titleInput.value.trim();
                const content = editorArea.innerHTML;
                
                const existingIndex = notes.findIndex(n => n.id === currentEditingId);
                
                if (existingIndex > -1) {
                    notes[existingIndex].title = title;
                    notes[existingIndex].content = content;
                    notes[existingIndex].updatedAt = Date.now();
                } else {
                    if (title !== '' || content !== '') {
                        notes.push({ id: currentEditingId, title: title, content: content, updatedAt: Date.now() });
                    }
                }
                
                localStorage.setItem('smart_notes_advanced', JSON.stringify(notes));
                
                const saveBtn = document.getElementById('save-note');
                const originalHtml = saveBtn.innerHTML;
                saveBtn.innerHTML = '<i class="fa-solid fa-check-double"></i> SAVED!';
                saveBtn.style.backgroundColor = 'var(--primary-glow)';
                saveBtn.style.color = '#000';
                setTimeout(() => {
                    saveBtn.innerHTML = originalHtml;
                    saveBtn.style.backgroundColor = '';
                    saveBtn.style.color = '';
                }, 1500);
            });

            window.deleteNote = function(event, id) {
                event.stopPropagation(); 
                if(confirm("Delete this note permanently?")) {
                    playClick();
                    notes = notes.filter(n => n.id !== id);
                    localStorage.setItem('smart_notes_advanced', JSON.stringify(notes));
                    renderNotes();
                }
            };

            document.getElementById('create-new-btn').addEventListener('click', () => openEditor(null));
            
            document.getElementById('back-to-list').addEventListener('click', () => {
                document.getElementById('save-note').click();
                editorView.style.display = 'none';
                listView.style.display = 'block';
                if(editorPanel.classList.contains('fullscreen-active')) toggleFullscreen();
                renderNotes();
            });

            const fullscreenBtn = document.getElementById('toggle-fullscreen');
            window.toggleFullscreen = function() {
                editorPanel.classList.toggle('fullscreen-active');
                if(editorPanel.classList.contains('fullscreen-active')) {
                    fullscreenBtn.innerHTML = '<i class="fa-solid fa-compress"></i>';
                } else {
                    fullscreenBtn.innerHTML = '<i class="fa-solid fa-expand"></i>';
                }
            };
            fullscreenBtn.addEventListener('click', toggleFullscreen);

            window.formatDoc = function(cmd, value=null) {
                document.execCommand(cmd, false, value);
                editorArea.focus();
            };

            window.insertCheckbox = function() {
                const checkboxHTML = '&nbsp;<input type="checkbox" style="vertical-align: middle;">&nbsp;';
                document.execCommand('insertHTML', false, checkboxHTML);
                editorArea.focus();
            };

            // 🐛 BUG FIX 1: Plain Text Paste Interceptor
            editorArea.addEventListener('paste', function(e) {
                e.preventDefault();
                // Get plain text from clipboard
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                // Insert it cleanly without website formatting
                document.execCommand('insertText', false, text);
            });

            // 🐛 BUG FIX 2: Placeholder '<br>' Fix
            editorArea.addEventListener('keyup', function() {
                if(this.innerHTML === '<br>' || this.innerHTML === '<br><br>') {
                    this.innerHTML = '';
                }
            });

            // 🐛 BUG FIX 3: Smart Enter Key for Checkboxes
            editorArea.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const sel = window.getSelection();
                    if (!sel.rangeCount) return;
                    const range = sel.getRangeAt(0);
                    let block = range.startContainer.nodeType === 3 ? range.startContainer.parentElement : range.startContainer;
                    
                    while (block && block.parentElement !== editorArea && block !== editorArea) {
                        block = block.parentElement;
                    }
                    if (block === editorArea) block = range.startContainer;

                    if (block && block.querySelector && block.querySelector('input[type="checkbox"]')) {
                        const textContent = block.textContent.replace(/\u00A0/g, '').trim();
                        if (textContent === '') {
                            e.preventDefault();
                            block.innerHTML = ''; 
                            document.execCommand('insertParagraph', false); 
                        } else {
                            e.preventDefault();
                            document.execCommand('insertParagraph', false);
                            document.execCommand('insertHTML', false, '&nbsp;<input type="checkbox" style="vertical-align: middle;">&nbsp;');
                        }
                    }
                }
            });

            renderNotes();
        });
    </script>
</body>
</html>
