<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Mobile Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <h1>Mobile Toolkit</h1>
    </header>

    <main class="container">
        <div class="grid">
            <a href="audio.html" class="card"><i class="fa-solid fa-headphones-simple"></i><h3>Audio Tester</h3></a>
            <a href="timer.html" class="card"><i class="fa-solid fa-stopwatch"></i><h3>Time Notes</h3></a>
            <a href="notes.html" class="card"><i class="fa-solid fa-clipboard-list"></i><h3>Advanced Notes</h3></a>
            <a href="converter.html" class="card"><i class="fa-solid fa-calculator"></i><h3>Unit Converter</h3></a>
            <a href="repeater.html" class="card"><i class="fa-solid fa-repeat"></i><h3>Text Repeater</h3></a>
            <a href="reverser.html" class="card"><i class="fa-solid fa-right-left"></i><h3>Text Reverser</h3></a>
        </div>
    </main>

    <footer>
        <p><i class="fa-solid fa-code"></i> Created by Alan</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const clickSound = new Audio('data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTEAAAAA/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/wD/AP8A/w==');
            document.querySelectorAll('a.card').forEach(el => el.addEventListener('click', () => clickSound.cloneNode().play().catch(()=>{})));
        });
    </script>
</body>
</html>
